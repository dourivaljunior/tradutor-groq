<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Tradutor IA Tempo Real
  </title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <div class="background-glow"></div>

  <div class="app">

    <!-- HEADER -->

    <header class="header">

      <div class="logo">

        🌎

      </div>

      <h1>
        Tradutor IA
      </h1>

      <p>
        Conversa Automática PT ↔ EN
      </p>

    </header>

    <!-- STATUS -->

    <section class="status-card">

      <div class="status-left">

        <div
          class="mic-led"
          id="micLed"
        ></div>

        <span id="statusText">
          Sistema parado
        </span>

      </div>

      <div
        class="live-badge"
        id="liveBadge"
      >
        LIVE
      </div>

    </section>

    <!-- VISUALIZER -->

    <section class="visualizer-card">

      <div
        class="visualizer"
        id="visualizer"
      >

        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>

      </div>

    </section>

    <!-- BOTÕES -->

    <section class="buttons">

      <button
        id="startBtn"
        class="start-btn"
      >
        ▶ Iniciar Conversa
      </button>

      <button
        id="stopBtn"
        class="stop-btn"
      >
        ⏹ Finalizar Conversa
      </button>

    </section>

    <!-- VOZ -->

    <section class="card">

      <div class="card-title">

        📝 Voz Detectada

      </div>

      <div
        class="card-content"
        id="originalText"
      >

        Aguardando conversa...

      </div>

    </section>

    <!-- TRADUÇÃO -->

    <section class="card">

      <div class="card-title">

        🌐 Tradução

      </div>

      <div
        class="card-content"
        id="translatedText"
      >

        Tradução aparecerá aqui...

      </div>

    </section>

  </div>

  <script src="script.js"></script>

</body>

</html>
