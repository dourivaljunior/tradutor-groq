<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tradutor de Painel - Modo Carro</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #1c1c1e;
            --primary: #007aff;
            --accent-pt: #34c759;
            --accent-en: #ff9500;
            --text: #ffffff;
        }

        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 20px; text-align: center; background: var(--card);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .dashboard {
            flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 20px;
            justify-content: space-around;
        }

        .box {
            background: var(--card); border-radius: 24px; padding: 25px;
            min-height: 120px; display: flex; flex-direction: column; justify-content: center;
            border-left: 8px solid transparent; transition: all 0.3s;
        }

        .box-pt { border-color: #34c759; }
        .box-en { border-color: #ff9500; }

        .lang-label { font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; opacity: 0.6; }
        .content { font-size: 24px; font-weight: 600; line-height: 1.2; }
        .original { font-size: 14px; margin-top: 10px; opacity: 0.5; font-style: italic; }

        .controls { display: flex; justify-content: center; padding: 30px; }
        
        #micBtn {
            width: 100px; height: 100px; border-radius: 50%; border: none;
            background: #007aff; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(0, 122, 255, 0.4); transition: all 0.3s;
        }

        #micBtn.listening {
            background: #ff3b30; transform: scale(1.1);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); } 
            70% { box-shadow: 0 0 0 20px rgba(255, 59, 48, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } 
        }

        .hint { text-align: center; font-size: 14px; opacity: 0.6; margin-top: 10px; }

        .status { position: absolute; top: 20px; right: 20px; font-size: 10px; display: flex; align-items: center; gap: 5px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #444; }
        .dot.active { background: #34c759; box-shadow: 0 0 5px #34c759; }
        
        .error-message {
            background: rgba(255, 59, 48, 0.2);
            border: 1px solid #ff3b30;
            border-radius: 12px;
            padding: 8px 12px;
            margin: 10px auto;
            max-width: 90%;
            text-align: center;
            font-size: 12px;
            color: #ff6b6b;
        }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 800; letter-spacing: 1px;">TRADUTOR DE PAINEL</div>
        <div class="status">
            <div id="status-dot" class="dot"></div>
            <span id="status-text">CARREGANDO...</span>
        </div>
    </header>

    <div class="dashboard">
        <div class="box box-pt">
            <div class="lang-label">Português (Motorista)</div>
            <div id="text-pt" class="content">...</div>
            <div id="orig-pt" class="original"></div>
        </div>

        <div class="box box-en">
            <div class="lang-label">English (Passenger)</div>
            <div id="text-en" class="content">...</div>
            <div id="orig-en" class="original"></div>
        </div>
    </div>

    <div class="controls">
        <div style="text-align: center;">
            <button id="micBtn">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" x2="12" y1="19" y2="22"/>
                </svg>
            </button>
            <div class="hint" id="hint-text">Toque para ouvir</div>
        </div>
    </div>
    
    <div id="error-container"></div>

    <!-- CARREGA A CHAVE DO ARQUIVO EXTERNO (NÃO COMMITADO) -->
    <script src="config.js"></script>
    
    <script>
        let GROQ_API_KEY = null;
        let micBtn, hintText, statusDot, statusText;
        let textPt, textEn, origPt, origEn;
        let recognition;

        // Aguarda o config.js carregar
        window.addEventListener('DOMContentLoaded', () => {
            micBtn = document.getElementById('micBtn');
            hintText = document.getElementById('hint-text');
            statusDot = document.getElementById('status-dot');
            statusText = document.getElementById('status-text');
            textPt = document.getElementById('text-pt');
            textEn = document.getElementById('text-en');
            origPt = document.getElementById('orig-pt');
            origEn = document.getElementById('orig-en');
            
            // Verifica se a chave foi carregada do config.js
            if (typeof window.GROQ_API_KEY !== 'undefined' && window.GROQ_API_KEY && window.GROQ_API_KEY !== "") {
                GROQ_API_KEY = window.GROQ_API_KEY;
                statusDot.classList.add('active');
                statusText.innerText = "GROQ ONLINE";
                initSpeechRecognition();
            } else {
                statusDot.classList.remove('active');
                statusText.innerText = "⚠️ API KEY NÃO CONFIGURADA";
                showError("❌ Arquivo config.js não encontrado ou chave não definida. Crie o arquivo config.js com: const GROQ_API_KEY = 'sua_chave';");
            }
        });

        function showError(msg) {
            const container = document.getElementById('error-container');
            container.innerHTML = `<div class="error-message">⚠️ ${msg}</div>`;
            setTimeout(() => {
                if (container.firstChild) container.innerHTML = '';
            }, 5000);
        }

        function initSpeechRecognition() {
            const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognitionAPI) {
                showError("Seu navegador não suporta reconhecimento de fala. Use Chrome, Edge ou Safari.");
                return;
            }
            
            recognition = new SpeechRecognitionAPI();
            recognition.lang = 'pt-BR';
            recognition.interimResults = false;
            recognition.continuous = false;

            micBtn.onclick = () => {
                try {
                    recognition.start();
                    micBtn.classList.add('listening');
                    hintText.innerText = "Ouvindo... Fale agora";
                } catch (e) {
                    console.error("Erro ao iniciar:", e);
                    hintText.innerText = "Erro no microfone";
                    micBtn.classList.remove('listening');
                }
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                translate(transcript);
            };

            recognition.onend = () => {
                micBtn.classList.remove('listening');
            };

            recognition.onerror = (event) => {
                console.error("Erro no reconhecimento:", event.error);
                micBtn.classList.remove('listening');
                hintText.innerText = "Erro ao ouvir. Tente novamente.";
                
                if (event.error === 'not-allowed') {
                    showError("Permissão do microfone negada. Verifique as configurações do seu navegador.");
                }
            };
        }

        async function translate(text) {
            if (!GROQ_API_KEY) {
                showError("API key não configurada. Crie o arquivo config.js");
                return;
            }

            hintText.innerText = "Traduzindo...";
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-70b-8192",
                        messages: [
                            {
                                role: "system", 
                                content: "You are a car translator. Detect if input is Portuguese or English. If Portuguese, translate to English. If English, translate to Portuguese. Return ONLY a JSON: {\"lang\": \"pt\" or \"en\", \"translation\": \"...\", \"original\": \"...\"}"
                            },
                            {role: "user", content: text}
                        ],
                        temperature: 0.3
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                let resultText = data.choices[0].message.content;
                resultText = resultText.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                const result = JSON.parse(resultText);
                
                updateUI(result);
            } catch (e) {
                console.error("Erro:", e);
                hintText.innerText = "Erro na tradução";
                showError(`Erro: ${e.message}`);
            }
        }

        function updateUI(data) {
            if (data.lang === 'pt') {
                textEn.innerText = data.translation;
                origPt.innerText = data.original;
                textPt.innerText = data.original;
                speak(data.translation, 'en-US');
            } else {
                textPt.innerText = data.translation;
                origEn.innerText = data.original;
                textEn.innerText = data.original;
                speak(data.translation, 'pt-BR');
            }
            hintText.innerText = "Concluído ✓";
            setTimeout(() => {
                if (!micBtn.classList.contains('listening')) {
                    hintText.innerText = "Toque para ouvir novamente";
                }
            }, 2000);
        }

        function speak(text, lang) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    </script>
</body>
</html>
