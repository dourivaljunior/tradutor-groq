<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Tradutor IA Tempo Real
  </title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <div class="container">

    <div class="card">

      <h1>
        🌎 Tradutor IA
      </h1>

      <p class="subtitle">
        Português ↔ English
      </p>

      <!-- STATUS -->

      <div
        class="status"
        id="status"
      >
        Sistema parado
      </div>

      <!-- BOTÕES -->

      <div class="buttons">

        <button
          id="startBtn"
          class="start-btn"
        >
          ▶ Iniciar Conversa
        </button>

        <button
          id="stopBtn"
          class="stop-btn"
        >
          ⏹ Terminar Conversa
        </button>

      </div>

      <!-- VU METER -->

      <div class="vu-container">

        <div class="vu-bar"></div>
        <div class="vu-bar"></div>
        <div class="vu-bar"></div>
        <div class="vu-bar"></div>
        <div class="vu-bar"></div>
        <div class="vu-bar"></div>
        <div class="vu-bar"></div>
        <div class="vu-bar"></div>
        <div class="vu-bar"></div>
        <div class="vu-bar"></div>

      </div>

      <!-- ORIGINAL -->

      <div class="box">

        <h2>
          📝 Voz Detectada
        </h2>

        <div id="originalText">

          Aguardando conversa...

        </div>

      </div>

      <!-- TRADUÇÃO -->

      <div class="box">

        <h2>
          🌐 Tradução
        </h2>

        <div id="translatedText">

          Tradução aparecerá aqui...

        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
